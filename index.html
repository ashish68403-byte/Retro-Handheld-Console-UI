<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Retro Handheld Console</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>
  <body>
    <!-- Console Body -->
    <main class="console-body">
      <!-- Screen Area-->
      <div class="screen-bezel">
        <div class="glowing-screen">
          <h1 class="animate__animated animate__pulse animate__infinite">PRESS START</h1>
        </div>
      </div>

      <!-- D-Pad -->
      <div class="d-pad">
        <div class="up"></div>
        <div class="down"></div>
        <div class="left"></div>
        <div class="right"></div>
      </div>

      <!-- Action Buttons-->
      <div class="action-buttons">
        <div class="A">A</div>
        <div class="B">B</div>
      </div>
    </main>
  </body>
</html>
